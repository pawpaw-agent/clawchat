name: Android CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  # Use Node.js 24 for GitHub Actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # 生成固定的 debug keystore（确保每次构建签名一致）
    - name: Generate debug keystore
      run: |
        mkdir -p openclaw-android/keystores
        keytool -genkey -v \
          -keystore openclaw-android/keystores/debug.keystore \
          -storepass android \
          -alias androiddebugkey \
          -keypass android \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -dname "CN=Clawchat Debug,O=OpenClaw,C=CN"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew || true
      working-directory: openclaw-android

    - name: Build with Gradle
      run: gradle assembleDebug --no-daemon
      working-directory: openclaw-android

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: openclaw-android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

    - name: Upload build reports
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-reports
        path: openclaw-android/app/build/reports
        retention-days: 7