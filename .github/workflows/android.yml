name: Android CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      working-directory: openclaw-android

    - name: Build with Gradle
      run: ./gradlew assembleDebug
      working-directory: openclaw-android

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: openclaw-android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

    - name: Upload build reports
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-reports
        path: openclaw-android/app/build/reports
        retention-days: 7