targets:
  $default:
    builders:
      freezed:
        options:
          # Generate union types with sealed classes
          union_key: 'type'
          union_value_case: 'snake'
      json_serializable:
        options:
          # Generate from/to JSON methods
          any_map: false
          checked: false
          create_factory: true
          create_to_json: true
          disallow_unrecognized_keys: false
          explicit_to_json: false
          field_rename: none
          include_if_null: true